<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEO資産度診断</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{
    --neon:#00d4ff;
    --neon2:#7b2fff;
    --gold:#c9a84c;
    --bg:#000;
    --white:#f0f0f0;
    --gray:#aaa;
  }
  body{
    background:var(--bg);
    color:var(--white);
    font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;
    min-height:100vh;
    overflow-x:hidden;
  }

  /* ===== SCREENS ===== */
  .screen{
    display:none;
    min-height:100vh;
    padding:40px 24px;
    flex-direction:column;
    align-items:center;
    justify-content:center;
  }
  .screen.active{display:flex;}

  /* ===== TOP ===== */
  #top{text-align:center;gap:32px;}
  .top-img{
    width:min(320px,80vw);
    height:min(320px,80vw);
    object-fit:cover;
    border:2px solid var(--gold);
    display:block;
    margin:0 auto;
  }
  .top-title{
    font-size:clamp(22px,5vw,36px);
    font-weight:900;
    letter-spacing:.05em;
    line-height:1.4;
  }
  .top-title span{color:var(--neon);}
  .top-sub{
    font-size:clamp(13px,3vw,17px);
    color:var(--gray);
    line-height:1.8;
  }
  .start-btn{
    margin-top:8px;
    padding:20px 48px;
    border:2px solid var(--neon);
    background:transparent;
    color:var(--neon);
    font-size:clamp(16px,4vw,22px);
    font-weight:700;
    letter-spacing:.1em;
    cursor:pointer;
    border-radius:4px;
    transition:all .3s;
    font-family:inherit;
    outline: none; /* 修正: 青枠防止 */
  }
  .start-btn:hover{
    background:rgba(0,212,255,.1);
    box-shadow:0 0 20px var(--neon),0 0 40px rgba(0,212,255,.3);
  }

  /* ===== QUIZ ===== */
  #quiz{gap:0;}
  .quiz-inner{
    width:100%;
    max-width:640px;
    animation:fadeIn .5s ease;
  }
  @keyframes fadeIn{
    from{opacity:0;transform:translateY(16px);}
    to{opacity:1;transform:translateY(0);}
  }
  .progress-bar{
    width:100%;
    height:4px;
    background:#222;
    border-radius:2px;
    margin-bottom:36px;
  }
  .progress-fill{
    height:100%;
    background:linear-gradient(90deg,var(--neon),var(--neon2));
    border-radius:2px;
    transition:width .5s ease;
  }
  .q-num{
    font-size:13px;
    color:var(--gold);
    letter-spacing:.15em;
    margin-bottom:12px;
    font-weight:700;
  }
  .q-text{
    font-size:clamp(17px,4vw,24px);
    font-weight:700;
    line-height:1.6;
    margin-bottom:36px;
  }
  .choices{
    display:flex;
    flex-direction:column;
    gap:16px;
  }
  .choice-btn{
    padding:20px 24px;
    border:1.5px solid #444;
    background:transparent;
    color:var(--white);
    font-size:clamp(14px,3.5vw,17px);
    font-family:inherit;
    text-align:left;
    cursor:pointer;
    border-radius:6px;
    line-height:1.6;
    transition:all .25s;
    position:relative;
    overflow:hidden;
    outline: none; /* 修正: 青枠防止 */
    -webkit-tap-highlight-color: transparent; /* スマホ用タップハイライト消去 */
  }
  .choice-btn:hover{
    border-color:var(--neon);
    box-shadow:0 0 12px rgba(0,212,255,.3);
  }
  /* 修正：クリック時の青枠を徹底排除 */
  .choice-btn:focus {
    outline: none;
  }
  .choice-btn.flash{
    border-color:var(--neon) !important;
    box-shadow:0 0 24px var(--neon),0 0 48px rgba(0,212,255,.4) !important;
    background:rgba(0,212,255,.08) !important;
  }
  .choice-tag{
    display:inline-block;
    font-size:11px;
    font-weight:700;
    letter-spacing:.1em;
    padding:2px 8px;
    border-radius:3px;
    margin-right:10px;
    vertical-align:middle;
  }
  .tag-a, .tag-b, .tag-c{ background:#5a5a5a; color:#fff; border:1px solid #7a7a7a; }

  /* ===== POINT HINT ===== */
  .hint-box{
    margin-top:28px;
    padding:20px 24px;
    border-left:3px solid var(--gold);
    background:rgba(201,168,76,.06);
    border-radius:0 6px 6px 0;
    font-size:clamp(14px,3.5vw,17px);
    line-height:1.8;
    color:#e8d5a3;
    animation:fadeIn .4s ease;
  }
  .hint-label{
    font-size:12px;
    color:var(--gold);
    letter-spacing:.15em;
    font-weight:700;
    margin-bottom:8px;
  }

  /* ===== LOADING ===== */
  #loading{
    position:fixed;
    inset:0;
    background:#000;
    display:none;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:32px;
    z-index:100;
  }
  #loading.active{display:flex;}
  .loader-ring{
    width:80px;
    height:80px;
    border:3px solid #111;
    border-top:3px solid var(--neon);
    border-right:3px solid var(--neon2);
    border-radius:50%;
    animation:spin 1s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .loader-text{
    font-size:clamp(15px,4vw,20px);
    color:var(--neon);
    letter-spacing:.05em;
    text-align:center;
    animation:pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse{ 0%,100%{opacity:.5;} 50%{opacity:1;} }
  .scan-line{
    width:200px;
    height:2px;
    background:linear-gradient(90deg,transparent,var(--neon),transparent);
    animation:scan 1.5s ease-in-out infinite;
  }
  @keyframes scan{ 0%{transform:scaleX(0);opacity:0;} 50%{transform:scaleX(1);opacity:1;} 100%{transform:scaleX(0);opacity:0;} }

  /* ===== RESULT ===== */
  #result{gap:28px;text-align:center;}
  .result-inner{
    width:100%;
    max-width:600px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:28px;
    animation:fadeIn .6s ease;
  }
  .result-img{
    width:min(280px,75vw);
    height:min(280px,75vw);
    object-fit:cover;
    border:2px solid var(--gold);
    display:block;
  }
  .result-rank{
    font-size:clamp(48px,12vw,80px);
    font-weight:900;
    line-height:1;
    background:linear-gradient(135deg,var(--neon),var(--neon2));
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
  }
  .result-score{
    font-size:clamp(14px,3vw,18px);
    color:var(--gray);
    margin-top:-8px;
  }
  .result-title{
    font-size:clamp(20px,5vw,30px);
    font-weight:900;
    color:var(--gold);
    letter-spacing:.05em;
    border:1.5px solid var(--gold);
    padding:12px 28px;
    border-radius:4px;
  }
  .result-msg{
    font-size:clamp(15px,3.5vw,18px);
    line-height:1.9;
    color:var(--white);
    text-align:left;
    background:#0a0a0a;
    border:1px solid #222;
    padding:24px;
    border-radius:8px;
    width:100%;
  }
  .result-msg strong{color:var(--neon);}

  /* ===== LINE AREA REBRANDED ===== */
  .line-cta-container {
    width: 100%;
    margin: 32px 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .line-cta {
    width: 80%;
    max-width: 400px;
    background: #06C755;
    border-radius: 50px;
    padding: 18px 20px;
    text-decoration: none;
    transition: all .3s;
    display: block;
    box-shadow: 0 4px 15px rgba(6,199,85,0.2);
    outline: none;
  }
  .line-cta:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(6,199,85,0.4);
  }
  .line-cta-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .line-cta-label {
    font-size: 12px;
    color: rgba(255,255,255,0.9);
    font-weight: 700;
    letter-spacing: 0.05em;
  }
  .line-cta-main {
    font-size: 16px;
    font-weight: 900;
    color: #fff;
    text-align: center;
  }
  .line-promo-text {
    font-size: 18px;
    font-weight: 700;
    color: var(--neon);
    line-height: 1.6;
    max-width: 90%;
    margin-top: 8px;
    text-align: center;
  }

  .retry-btn{
    padding:16px 40px;
    border:1.5px solid #444;
    background:transparent;
    color:var(--gray);
    font-size:15px;
    font-family:inherit;
    cursor:pointer;
    border-radius:4px;
    transition:all .3s;
    letter-spacing:.05em;
    outline: none;
  }
  .retry-btn:hover{
    border-color:#666;
    color:var(--white);
  }
  b{font-weight:700;}
</style>
</head>
<body>

<div id="top" class="screen active">
  <div id="top-img-wrap">
    <img src="top.png" class="top-img" alt="MEO診断">
  </div>
  <div class="top-title">あなたのサロンは<br><span>AIに見えていますか？</span></div>
  <div class="top-sub">全12問・約3分｜MEO資産度診断<br>Googleマップ時代の「集客力」を数値化</div>
  <button class="start-btn" onclick="startQuiz()">診断スタート →</button>
</div>

<div id="quiz" class="screen">
  <div class="quiz-inner" id="quiz-inner"></div>
</div>

<div id="loading">
  <div class="loader-ring"></div>
  <div class="scan-line"></div>
  <div class="loader-text">AIがサロンの構造を解析中...</div>
</div>

<div id="result" class="screen">
  <div class="result-inner" id="result-inner"></div>
</div>

<script>
const questions = [
  {
    num:1,
    text:'もし今日インスタが消えたら、来月の新規予約は「ゼロ」になる恐怖がありますか？',
    hint:'SNSに依存しない集客構造が、これからの時代に必須のサロン資産です。',
    choices:[
      {tag:'A',text:'いいえ。',pt:10},
      {tag:'B',text:'少し不安。',pt:5},
      {tag:'C',text:'はい。',pt:0},
    ]
  },
  {
    num:2,
    text:'あなたのお店を表現する言葉に「癒やし」「隠れ家」などの抽象的な言葉ばかり使っていませんか？',
    hint:'AIは「感性」ではなく「名詞」で検索します。',
    choices:[
      {tag:'A',text:'具体的な名詞を多用している。',pt:10},
      {tag:'B',text:'意識はしているが、つい雰囲気重視になる。',pt:5},
      {tag:'C',text:'雰囲気や感性だけで伝えている。',pt:0},
    ]
  },
  {
    num:3,
    text:'あなたのお店のHPは、自分でお金を払って管理している「独自ドメイン」ですか？',
    hint:'独自ドメインだけが「自分の土地」です。',
    choices:[
      {tag:'A',text:'はい。自分の土地を育てている。',pt:10},
      {tag:'B',text:'無料ブログや予約サイトをHP代わりにしている。',pt:5},
      {tag:'C',text:'HP自体を持っていない。',pt:0},
    ]
  },
  {
    num:4,
    text:'GoogleマップとHPに載せている「住所・電話番号・営業時間」は、1文字も狂わず一致していますか？',
    hint:'AIは「NAP情報の一致度」でお店の信頼性を判断します。',
    choices:[
      {tag:'A',text:'完璧に一致させている。',pt:10},
      {tag:'B',text:'だいたい合っていると思う。',pt:5},
      {tag:'C',text:'確認したことがない。',pt:0},
    ]
  },
  {
    num:5,
    text:'Googleビジネスプロフィールの「最新情報」を、週に1回以上写真付きで投稿していますか？',
    hint:'放置は「閉店」と同じシグナルです。',
    choices:[
      {tag:'A',text:'はい。定期的にお店をアピールしている。',pt:10},
      {tag:'B',text:'月に1〜2回程度。',pt:5},
      {tag:'C',text:'放置している。',pt:0},
    ]
  },
  {
    num:6,
    text:'直近3ヶ月以内に、施術風景やビフォーアフターの写真を5枚以上アップしましたか？',
    hint:'写真はAIが「専門性」を判断する重要データです。',
    choices:[
      {tag:'A',text:'はい。常に最新を届けている。',pt:10},
      {tag:'B',text:'数枚は上げている。',pt:5},
      {tag:'C',text:'写真はほとんど変えていない。',pt:0},
    ]
  },
  {
    num:7,
    text:'いただいた口コミに対して、定型文ではなく「プロの視点」を交えた返信をしていますか？',
    hint:'返信の中の専門用語は、AIへのアピール文になります。',
    choices:[
      {tag:'A',text:'はい。返信もアピール材料だと知っている。',pt:10},
      {tag:'B',text:'簡単な返信のみ。',pt:5},
      {tag:'C',text:'返信していない、または口コミがない。',pt:0},
    ]
  },
  {
    num:8,
    text:'スマホで自分のHPを開いたとき、ストレスなく3秒以内にすべて表示されますか？',
    hint:'Googleは表示速度をランキングの重要指標にしています。',
    choices:[
      {tag:'A',text:'爆速。画像も最適化している。',pt:10},
      {tag:'B',text:'少し重いが、なんとか開く。',pt:5},
      {tag:'C',text:'かなり重い。',pt:0},
    ]
  },
  {
    num:9,
    text:'インスタを「集客の柱」ではなく、信頼を得るための「カタログ」として割り切れていますか？',
    hint:'役割分担がSNS疲れを消す処方箋です。',
    choices:[
      {tag:'A',text:'はい。役割を明確に分けている。',pt:10},
      {tag:'B',text:'集客のために必死に更新している。',pt:5},
      {tag:'C',text:'インスタさえ頑張れば良いと思う。',pt:0},
    ]
  },
  {
    num:10,
    text:'地域の飲食店や、信頼できる他サイトからあなたのお店へのリンクがありますか？',
    hint:'被リンクは「地域の信頼の投票」です。',
    choices:[
      {tag:'A',text:'はい。地域で紹介されている。',pt:10},
      {tag:'B',text:'数カ所ある。',pt:5},
      {tag:'C',text:'どこからもリンクされていない。',pt:0},
    ]
  },
  {
    num:11,
    text:'「いい技術さえあれば、いつか見つけてもらえる」と対策を後回しにしていませんか？',
    hint:'技術は品質、MEOは存在証明。両方必要です。',
    choices:[
      {tag:'A',text:'いいえ。AIに正しく伝える義務があると思う。',pt:10},
      {tag:'B',text:'少しそう思いたい。',pt:5},
      {tag:'C',text:'技術さえ磨けば、AIなんて不要だと思う。',pt:0},
    ]
  },
  {
    num:12,
    text:'今の活動は、やればやるほど「来年の自分が楽になる資産に」なっていますか？',
    hint:'SNS投稿は消耗品、MEO対策は資産です。',
    choices:[
      {tag:'A',text:'はい。仕組みが育っている実感がある。',pt:10},
      {tag:'B',text:'少しずつは溜まっている。',pt:5},
      {tag:'C',text:'全くない。毎日泳がないと沈む。',pt:0},
    ]
  },
];

const ranks = [
  {min:110,max:120,rank:'S',img:'rank_s.png',title:'地域独占・レコメンドの覇者', msg:'おめでとうございます！自動集客の仕組みを完璧に手に入れました。'},
  {min:90,max:109,rank:'A',img:'rank_a.png',title:'エリアの人気店', msg:'素晴らしい！あともう少し磨けば無敵です。'},
  {min:60,max:89,rank:'B',img:'rank_b.png',title:'脱・SNS労働予備軍', msg:'惜しい！AIへのデータ設計を強化して労働から卒業しましょう。'},
  {min:30,max:59,rank:'C',img:'rank_c.png',title:'埋もれた実力店', msg:'技術はあるのにAIに知られていません。地図に正しく載せましょう。'},
  {min:0,max:29,rank:'D',img:'rank_d.png',title:'デジタル上の幽霊店', msg:'緊急事態！今すぐ未来に繋がる設計を始めてください。'},
];

let cur=0, scores=[];

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0); // 修正：画面切り替え時に上部にスクロール
}

function startQuiz(){
  cur=0; scores=[];
  showScreen('quiz');
  renderQ();
}

function renderQ(){
  const q=questions[cur];
  const pct=Math.round((cur/questions.length)*100);
  const html=`
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="q-num">QUESTION ${String(q.num).padStart(2,'0')} / 12</div>
    <div class="q-text">${q.text}</div>
    <div class="choices">
      ${q.choices.map((c,i)=>`<button class="choice-btn" onclick="answer(${c.pt},this)"> <span class="choice-tag tag-${c.tag.toLowerCase()}">${c.tag}</span>${c.text} </button>`).join('')}
    </div>
    <div id="hint-area"></div>
  `;
  const container = document.getElementById('quiz-inner');
  container.innerHTML=html;
  window.scrollTo(0,0); // 修正：設問更新時に上部へ
}

function answer(pt, btn){
  btn.blur(); // 修正：クリックした瞬間にフォーカスを外して青枠を消す
  scores.push(pt);
  document.querySelectorAll('.choice-btn').forEach(b=>b.disabled=true);
  btn.classList.add('flash');
  document.getElementById('hint-area').innerHTML=`<div class="hint-box"><div class="hint-label">💡 解説</div>${questions[cur].hint}</div>`;
  setTimeout(()=>{
    cur++;
    if(cur>=questions.length) showLoading();
    else renderQ();
  },1500);
}

function showLoading(){
  document.getElementById('loading').classList.add('active');
  setTimeout(()=>{
    document.getElementById('loading').classList.remove('active');
    showResult();
  },2000);
}

function showResult(){
  const total=scores.reduce((a,b)=>a+b,0);
  const rank=ranks.find(r=>total>=r.min && total<=r.max) || ranks[ranks.length-1];
  const inner=document.getElementById('result-inner');
  
  inner.innerHTML=`
    <div class="result-rank">RANK ${rank.rank}</div>
    <div class="result-score">スコア：${total} / 120点</div>
    <img src="${rank.img}" class="result-img" alt="${rank.title}">
    <div class="result-title">${rank.title}</div>
    <div class="result-msg">${rank.msg}</div>
    
    <div class="line-cta-container">
      <a href="https://lin.ee/woRCsiS" target="_blank" rel="noopener" class="line-cta">
        <div class="line-cta-inner">
          <div class="line-cta-label">🎁 無料プレゼント受け取り</div>
          <div class="line-cta-main">LINE登録で特典を受け取る →</div>
        </div>
      </a>
      <div class="line-promo-text">
        2026年最新版『AIがお勧めしたくなるお店の作り方』<br>解説スライドをプレゼント中
      </div>
    </div>

    <button class="retry-btn" onclick="startQuiz()">もう一度診断する</button>
  `;
  showScreen('result');
}
</script>
</body>
</html>
